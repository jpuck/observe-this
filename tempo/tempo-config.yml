server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # receives traces from the OTel Collector

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h   # keep traces for 1 hour (learning environment)

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
