events {}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /nginx_status {
      stub_status;
      allow 127.0.0.1;
      allow 172.16.0.0/12;  # Docker networks
      deny all;
    }
  }
}
