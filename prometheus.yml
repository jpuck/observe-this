global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]  # host network mode — not on Docker bridge

  # App metrics are no longer scraped from the app directly.
  # The OTel Collector receives them via OTLP and re-exposes them in Prometheus format.
  - job_name: "node-app"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
